<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>CAPPI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>CAPPI</h1>
        <div class="container-bar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>                  
        </div>
        <div class="container-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-cart">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
            </svg>
        </div>
    </header>
    <div class="container-items">

        <div class="item">
            <figure>
                <img src="img/topbarbie.jpeg"> 
            </figure>
            <div class="info-product">
                <h2>Top Barbie</h2>
                <p><div class="price">s/20.00</div></p>
                <button>Añadir al carrito</button>
            </div>
        </div>

        <div class="item">
            <figure>
                <img src="/Tienda web/img/topsam.jpeg"> 
            </figure>
            <div class="info-product">
                <h2>Top Sam</h2>
                <p><div class="price">s/35.00</div></p>
                <button>Añadir al carrito</button>
            </div>
        </div>

        <div class="item">
            <figure>
                <img src="/Tienda web/img/topvenecia.jpeg"> 
            </figure>
            <div class="info-product">
                <h2>Top Venecia</h2>
                <p><div class="price">s/25.00</div></p>
                <button>Añadir al carrito</button>
            </div>
        </div>

            <figure>
                <img src="/Tienda web/img/faldashort.jpeg"> 
            </figure>
            <div class="info-product">
                <h2>Falda Short</h2>
                <p><div class="price">s/35.00</div></p>
                <button>Añadir al carrito</button>
            </div>
        </div>

        <div class="item">
            <figure>
                <img src="/Tienda web/img/topbra.jpeg"> 
            </figure>
            <div class="info-product">
                <h2>Top Bra</h2>
                <p><div class="price">s/29.00</div></p>
                <button>Añadir al carrito</button>
            </div>
        </div>

    </div>
